        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideInScale {
            from {
                opacity: 0;
                transform: scale(0.6) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        [data-anim] {
            opacity: 0;
            transition: none;
        }

        [data-anim].anim-visible {
            animation-fill-mode: both;
            animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
        }

        [data-anim="fade-up"].anim-visible {
            animation-name: fadeInUp;
        }

        [data-anim="fade-down"].anim-visible {
            animation-name: fadeInDown;
        }

        [data-anim="fade-left"].anim-visible {
            animation-name: fadeInLeft;
        }

        [data-anim="fade-right"].anim-visible {
            animation-name: fadeInRight;
        }

        [data-anim="scale-in"].anim-visible {
            animation-name: scaleIn;
        }

        [data-anim="slide-scale"].anim-visible {
            animation-name: slideInScale;
        }

        header {

    <!-- Animation Engine -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const animEls = document.querySelectorAll('[data-anim]');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const el = entry.target;
                        const delay = el.dataset.delay || 0;
                        const duration = el.dataset.duration || '0.8s';
                        setTimeout(() => {
                            el.style.animationDuration = duration;
                            el.classList.add('anim-visible');
                        }, parseInt(delay));
                        observer.unobserve(el);
                    }
                });
            }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
            animEls.forEach(el => observer.observe(el));

            document.querySelectorAll('a[href^="#"]').forEach(a => {
                a.addEventListener('click', e => {
                    const target = document.querySelector(a.getAttribute('href'));
                    if (target) {
                        e.preventDefault();
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
        });
    </script>
